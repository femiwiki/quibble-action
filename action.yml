name: quibble-action
description: Quibble is for setting up a MediaWiki instance and running various tests against it.
inputs:
  # Docker
  docker-registry:
    default: docker-registry.wikimedia.org
  docker-org:
    default: releng
  debian:
    description: Debian base for the Quibble image. Derived from the stage and MediaWiki branch when empty; see the README "Docker images" section.
    default: ""
  quibble-docker-image:
    description: >-
      Override for the Quibble Docker image. When empty, it is derived as
      `quibble-<debian>-php<version>` from `debian` and `php-version`.
    default: ""
  coverage-docker-image:
    description: >-
      Override for the coverage Docker image. Defaults to `quibble-coverage`,
      the single pcov-based image Wikimedia CI uses for PHPUnit coverage (it
      replaced the old per-PHP `quibble-<debian>-php<version>-coverage` images).
    default: quibble-coverage
  phan-docker-image:
    description: Override for the image the `phan` stage runs in. Defaults to `mediawiki-phan-testrun`; see the README "Docker images" section.
    default: ""
  php-version:
    description: PHP version for the images and the host. Derived from the stage and MediaWiki branch when empty; see the README "Docker images" section.
    default: ""

  project-path:
    description: >-
      Path to the extension or skin under test, relative to the workspace.
      Defaults to the workspace root. Set this when the action itself is checked
      out at the workspace root (so it can be referenced as `uses: ./`) and the
      project under test is checked out into a subdirectory.
    default: "."
  mediawiki-version:
    default: REL1_45
  stage:
    description: All stages listed at https://doc.wikimedia.org/quibble/usage.html#stages. `phan` and `coverage` also supported.
    default: all
  dependencies:
    description: |
      Whitespace/comma separated list of dependency extensions or skins, e.g.
      `Foo Bar` or `extensions/Foo skins/Bar`. When set, this takes priority
      over the dependencies inferred from the extension.json/skin.json
      `requires` clause and from the phan config (.phan/config.php).
    default: ""
  exclude-dependencies:
    default: ""
  cache-key:
    default: true
  upload-logs:
    description: >-
      Upload Quibble's logs as an artifact after the run (including on failure).
      Off by default. Before enabling, consider that the artifact uses storage
      (billable on private repositories), is kept for the repository's retention
      period, and is downloadable by anyone who can view the run, so it should
      not contain sensitive data.
    default: false
  log-artifact-name:
    description: >-
      Name for the artifact that Quibble's logs are uploaded under. Use a unique
      name per job when running a matrix, since artifact names must be unique
      within a workflow run.
    default: quibble-logs
outputs:
  coverage:
    value: ${{ steps.setup.outputs.dir }}/cover
runs:
  using: composite
  steps:
    # $RUNNER_TEMP/cache/                               Cache
    # $RUNNER_TEMP/src/                                 Mediawiki installation
    # $RUNNER_TEMP/src/<TYPE>s/<EXTENSION_NAME>/        Clone of the extension repository
    # $RUNNER_TEMP/docker-images/                       Docker images which exported with docker-save command
    - id: setup
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        # Set up
        # Base directory for all scratch dirs. RUNNER_TEMP avoids hardcoding the
        # home path, which is not portable to self-hosted, container, or non-Linux
        # runners, and is emptied at the start of each job.
        echo "dir=$RUNNER_TEMP" >> "$GITHUB_OUTPUT"
        # The project under test lives at inputs.project-path, which may be a
        # subdirectory when the action is checked out at the workspace root.
        cd "$PROJECT_PATH"
        if [ -e extension.json ]; then
          echo "type=extension" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r .name extension.json)" >> "$GITHUB_OUTPUT"
        elif [ -e skin.json ]; then
          echo "type=skin" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r .name skin.json)" >> "$GITHUB_OUTPUT"
        else
          echo "type=skin" >> "$GITHUB_OUTPUT"
          echo "name=Vector" >> "$GITHUB_OUTPUT"
        fi

    - id: tags
      shell: bash
      env:
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        DEBIAN: ${{ inputs.debian }}
        PHP_VERSION: ${{ inputs.php-version }}
        MEDIAWIKI_VERSION: ${{ inputs.mediawiki-version }}
        QUIBBLE_IMAGE_OVERRIDE: ${{ inputs.quibble-docker-image }}
        COVERAGE_IMAGE_OVERRIDE: ${{ inputs.coverage-docker-image }}
        PHAN_IMAGE_OVERRIDE: ${{ inputs.phan-docker-image }}
        STAGE: ${{ inputs.stage }}
      run: |
        if [ -n "${PHP_VERSION}" ]; then
          php_version="${PHP_VERSION}"
        elif [ "${STAGE}" == 'api-testing' ]; then
          php_version='8.3'
        else
          case "${MEDIAWIKI_VERSION}" in
            REL1_43 | REL1_44) php_version='8.1' ;;
            REL1_45) php_version='8.2' ;;
            REL1_46) php_version='8.3' ;;
            master) php_version='8.3' ;;
            *) php_version='8.4' ;;
          esac
        fi
        echo "php_version=${php_version}" >> "$GITHUB_OUTPUT"
        if [ -n "${DEBIAN}" ]; then
          debian="${DEBIAN}"
        elif [ "${STAGE}" == 'api-testing' ] || [ "${STAGE}" == 'phan' ]; then
          debian='bookworm'
        else
          case "${MEDIAWIKI_VERSION}" in
            REL1_43 | REL1_44) debian='buster' ;;
            *) debian='bookworm' ;;
          esac
        fi
        php="php${php_version//./}"
        QUIBBLE_DOCKER_IMAGE="${QUIBBLE_IMAGE_OVERRIDE:-quibble-${debian}-${php}}"
        COVERAGE_DOCKER_IMAGE="${COVERAGE_IMAGE_OVERRIDE:-quibble-coverage}"
        PHAN_DOCKER_IMAGE="${PHAN_IMAGE_OVERRIDE:-mediawiki-phan-testrun}"
        echo "quibble_image=${QUIBBLE_DOCKER_IMAGE}" >> "$GITHUB_OUTPUT"
        echo "coverage_image=${COVERAGE_DOCKER_IMAGE}" >> "$GITHUB_OUTPUT"
        echo "phan_image=${PHAN_DOCKER_IMAGE}" >> "$GITHUB_OUTPUT"
        QUIBBLE_DOCKER_LATEST_TAG="$(curl -sL "https://${DOCKER_REGISTRY}/v2/${DOCKER_ORG}/${QUIBBLE_DOCKER_IMAGE}/tags/list" |
          python3 -c 'import json;print("\n".join(json.loads(input())["tags"]))' |
          grep -v latest | sort -Vr | head -1)"
        echo "quibble=${QUIBBLE_DOCKER_LATEST_TAG}" >> "$GITHUB_OUTPUT"
        if [ "${STAGE}" == 'phan' ]; then
          echo "phan=$(curl -sL "https://${DOCKER_REGISTRY}/v2/${DOCKER_ORG}/${PHAN_DOCKER_IMAGE}/tags/list" |
            python3 -c 'import json;print("\n".join(json.loads(input())["tags"]))' |
            grep -v latest | sort -Vr | head -1)" >> "$GITHUB_OUTPUT"
        elif [ "${STAGE}" == 'coverage' ]; then
          echo "coverage=$(curl -sL "https://${DOCKER_REGISTRY}/v2/${DOCKER_ORG}/${COVERAGE_DOCKER_IMAGE}/tags/list" |
            python3 -c 'import json;print("\n".join(json.loads(input())["tags"]))' |
            grep -v latest | sort -Vr | head -1)" >> "$GITHUB_OUTPUT"
        fi

    - id: deps
      shell: bash
      env:
        DEPENDENCIES_INPUT: ${{ inputs.dependencies }}
        EXCLUDE_DEPENDENCIES: ${{ inputs.exclude-dependencies }}
        PROJECT_PATH: ${{ inputs.project-path }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Resolve dependencies from the first source that yields anything: the
        # dependencies input, then the requires clause of extension.json/skin.json,
        # then the phan config (.phan/config.php).
        cd "$PROJECT_PATH"
        DEPENDENCIES="$(python3 "$ACTION_PATH/resolve_dependencies.py" "$DEPENDENCIES_INPUT")"
        for dep in ${EXCLUDE_DEPENDENCIES}; do
          DEPENDENCIES="$(echo "$DEPENDENCIES" | grep -v /${dep}$)"
        done
        DEPENDENCIES="$(echo $DEPENDENCIES | tr '\n' ' ')"
        echo "dependencies=${DEPENDENCIES}" >> "$GITHUB_OUTPUT"

    - name: Cache quibble docker image
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.setup.outputs.dir }}/docker-images/${{ steps.tags.outputs.quibble_image }}
        key: ${{ steps.tags.outputs.quibble_image }}:${{ steps.tags.outputs.quibble }}-${{ inputs.cache-key }}

    - shell: bash
      env:
        BASE_DIR: ${{ steps.setup.outputs.dir }}
        QUIBBLE_DOCKER_IMAGE: ${{ steps.tags.outputs.quibble_image }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        QUIBBLE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.quibble }}
      run: |
        # Load or pull quibble docker image
        if [ -f "${BASE_DIR}"/docker-images/"${QUIBBLE_DOCKER_IMAGE}" ]; then
          docker load -i "${BASE_DIR}"/docker-images/"${QUIBBLE_DOCKER_IMAGE}"
        else
          docker pull "${DOCKER_REGISTRY}/${DOCKER_ORG}/${QUIBBLE_DOCKER_IMAGE}:${QUIBBLE_DOCKER_LATEST_TAG}"
        fi

    - name: Cache quibble coverage docker image
      if: inputs.stage == 'coverage'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.setup.outputs.dir }}/docker-images/${{ steps.tags.outputs.coverage_image }}
        key: ${{ steps.tags.outputs.coverage_image }}:${{ steps.tags.outputs.coverage }}-${{ inputs.cache-key }}

    - if: inputs.stage == 'coverage'
      shell: bash
      env:
        BASE_DIR: ${{ steps.setup.outputs.dir }}
        COVERAGE_DOCKER_IMAGE: ${{ steps.tags.outputs.coverage_image }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        COVERAGE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.coverage }}
      run: |
        # Load or pull quibble coverage docker image
        if [ -f "${BASE_DIR}"/docker-images/"${COVERAGE_DOCKER_IMAGE}" ]; then
          docker load -i "${BASE_DIR}"/docker-images/"${COVERAGE_DOCKER_IMAGE}"
        else
          docker pull "${DOCKER_REGISTRY}/${DOCKER_ORG}/${COVERAGE_DOCKER_IMAGE}:${COVERAGE_DOCKER_LATEST_TAG}"
        fi

    - name: Cache MediaWiki installation
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.setup.outputs.dir }}/src
        key: ${{ runner.os }}-${{ inputs.mediawiki-version }}-${{ hashFiles(format('{0}/extension.json', inputs.project-path), format('{0}/skin.json', inputs.project-path), format('{0}/.phan/config.php', inputs.project-path)) }}-${{ inputs.dependencies }}-${{ inputs.exclude-dependencies }}-${{ inputs.cache-key }}

    - shell: bash
      env:
        BASE_DIR: ${{ steps.setup.outputs.dir }}
        MEDIAWIKI_VERSION: ${{ inputs.mediawiki-version }}
        DEPENDENCIES: ${{ steps.deps.outputs.dependencies }}
      run: |
        # Download MediaWiki and extensions. Cloned from the official GitHub
        # mirrors (github.com/wikimedia/*, same refs as Gerrit): Gerrit
        # rate-limits the shared Actions runner IPs (HTTP 429), which made
        # these clones fail intermittently.
        cd "$BASE_DIR"
        if [ ! -d src ]; then
          git clone -b "${MEDIAWIKI_VERSION}" --depth 1 https://github.com/wikimedia/mediawiki src
          git clone --recurse-submodules -b "${MEDIAWIKI_VERSION}" --depth 1 https://github.com/wikimedia/mediawiki-skins-Vector src/skins/Vector
          for dep in $DEPENDENCIES; do
            if [ "$dep" = 'mediawiki/extensions/Wikibase' ]; then
              git clone -b "${MEDIAWIKI_VERSION}" --depth 1 "https://github.com/wikimedia/$(echo $dep | tr '/' '-')" src/"$(echo $dep | cut -d'/' -f2,3)"

              cd src/"$(echo $dep | cut -d'/' -f2,3)"
              # Repoint dead phabricator submodule URLs at their github
              # mirrors. Idempotent: a no-op on branches that already use
              # github (e.g. master), where a hardcoded patch failed to apply.
              # https://gerrit.wikimedia.org/r/q/I2037cd8bb5d568021472e048900649028b5dcc62
              sed -i \
                -e 's#https://phabricator.wikimedia.org/source/wikibase-serialization.git#https://github.com/wmde/WikibaseSerializationJavaScript.git#' \
                -e 's#https://phabricator.wikimedia.org/source/datavalues-javascript.git#https://github.com/wmde/DataValuesJavaScript.git#' \
                -e 's#https://phabricator.wikimedia.org/source/wikibase-data-model.git#https://github.com/wmde/WikibaseDataModelJavaScript.git#' \
                .gitmodules
              git submodule update --init
              cd -
            elif [ "$dep" = 'mediawiki/extensions/WikibaseLexeme' ]; then
              git clone -b "${MEDIAWIKI_VERSION}" --depth 1 "https://github.com/wikimedia/$(echo $dep | tr '/' '-')" src/"$(echo $dep | cut -d'/' -f2,3)"

              cd src/"$(echo $dep | cut -d'/' -f2,3)"
              # Repoint the dead phabricator submodule URL at its github
              # mirror. Idempotent across branches; see the Wikibase note above.
              # https://gerrit.wikimedia.org/r/q/I2037cd8bb5d568021472e048900649028b5dcc62
              sed -i \
                -e 's#https://phabricator.wikimedia.org/diffusion/NLSP/new-lexeme-special-page.git#https://github.com/wmde/new-lexeme-special-page.git#' \
                .gitmodules
              git submodule update --init
              cd -
            else
              git clone --recurse-submodules -b "${MEDIAWIKI_VERSION}" --depth 1 "https://github.com/wikimedia/$(echo $dep | tr '/' '-')" src/"$(echo $dep | cut -d'/' -f2,3)"
            fi
          done
        fi
        git -C src/ log -n 1 --format="%H"

    - name: Cache dependencies (composer)
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.setup.outputs.dir }}/cache
        key: ${{ runner.os }}-${{ inputs.mediawiki-version }}-${{ hashFiles('**/*.lock') }}-${{ inputs.cache-key }}

    - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
      if: inputs.stage == 'phan'
      with:
        php-version: ${{ steps.tags.outputs.php_version }}

    - if: inputs.stage == 'phan'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        # Composer install
        cd "$PROJECT_PATH"
        if [ -e composer.json ]; then
          composer install --prefer-dist --no-progress --no-interaction
        fi

    - shell: bash
      env:
        BASE_DIR: ${{ steps.setup.outputs.dir }}
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        # Prepare directories
        # Resolve the project dir before changing into the scratch base.
        project_dir="$(cd "${GITHUB_WORKSPACE}/${PROJECT_PATH}" && pwd)"
        cd "$BASE_DIR"
        # Move our repository
        mkdir -p cache cover log src/skins src/extensions
        sudo cp -r "$project_dir" "src/${TYPE}s/${EXTENSION_NAME}"
        chmod 777 src cache cover log
        # https://github.com/femiwiki/.github/issues/3
        sudo chown -R nobody:nogroup src cache
        sudo chown $(id -u):$(id -g) src cache

    - if: inputs.stage == 'phan'
      shell: bash
      working-directory: ${{ steps.setup.outputs.dir }}
      env:
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        QUIBBLE_DOCKER_IMAGE: ${{ steps.tags.outputs.quibble_image }}
        QUIBBLE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.quibble }}
        DEPENDENCIES: ${{ steps.deps.outputs.dependencies }}
      run: |
        # Composer install
        docker run \
          --entrypoint quibble-with-supervisord \
          -e "ZUUL_PROJECT=mediawiki/${TYPE}s/${EXTENSION_NAME}" \
          -v "$(pwd)"/cache:/cache \
          -v "$(pwd)"/src:/workspace/src \
          "${DOCKER_REGISTRY}/${DOCKER_ORG}/${QUIBBLE_DOCKER_IMAGE}:${QUIBBLE_DOCKER_LATEST_TAG}" \
          --skip-zuul \
          --packages-source composer \
          --skip-install \
          --skip all \
          $DEPENDENCIES

    - if: inputs.stage == 'phan'
      shell: bash
      working-directory: ${{ steps.setup.outputs.dir }}
      env:
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        PHAN_DOCKER_IMAGE: ${{ steps.tags.outputs.phan_image }}
        PHAN_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.phan }}
      run: |
        image="${DOCKER_REGISTRY}/${DOCKER_ORG}/${PHAN_DOCKER_IMAGE}:${PHAN_DOCKER_LATEST_TAG}"
        docker image inspect "$image" >/dev/null 2>&1 || docker pull "$image"
        project="/workspace/src/${TYPE}s/${EXTENSION_NAME}"
        installed="src/${TYPE}s/${EXTENSION_NAME}/vendor/composer/installed.json"
        phan_version="$(jq -r '(.packages // .)[] | select(.name == "phan/phan") | .version | ltrimstr("v")' "$installed" 2>/dev/null || true)"
        run_phan() {
          docker run \
            -e HOME=/tmp \
            -v "$(pwd)"/src:/workspace/src \
            --entrypoint bash \
            "$image" \
            -c "cd '$project' && vendor/bin/phan -d . --long-progress-bar --require-config-exists $1"
        }
        if [ -n "$phan_version" ] && printf '%s\n5.5.0\n' "$phan_version" | sort -V | head -n1 | grep -qx '5.5.0'; then
          run_phan "--output-mode github"
        else
          status=0
          run_phan "--output-mode checkstyle" > phan-checkstyle.xml || status=$?
          export COMPOSER_HOME="$(pwd)/.cs2pr-composer"
          composer global require --no-interaction --quiet \
            staabm/annotate-pull-request-from-checkstyle:1.8.7
          "$(composer global config bin-dir --absolute)/cs2pr" phan-checkstyle.xml || true
          exit "$status"
        fi

    - if: inputs.stage == 'coverage'
      shell: bash
      working-directory: ${{ steps.setup.outputs.dir }}
      env:
        MEDIAWIKI_VERSION: ${{ inputs.mediawiki-version }}
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        COVERAGE_DOCKER_IMAGE: ${{ steps.tags.outputs.coverage_image }}
        COVERAGE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.coverage }}
        DEPENDENCIES: ${{ steps.deps.outputs.dependencies }}
      run: |
        # Coverage
        # MediaWiki's coverage helper (tests/phpunit/generatePHPUnitConfig.php,
        # invoked by mw{ext,skin}-phpunit-coverage) currently exists only on the
        # master branch, so coverage requires mediawiki-version: master.
        if [ "${MEDIAWIKI_VERSION}" != 'master' ]; then
          echo "::warning::Skipping coverage: it requires mediawiki-version: master (MediaWiki's coverage tooling lives only in master)."
        elif [ -d "src/${TYPE}s/${EXTENSION_NAME}/tests/phpunit" ]; then
          if [ "${TYPE}" == 'skin' ]; then
            COMMAND=mwskin-phpunit-coverage
          else
            COMMAND=mwext-phpunit-coverage
          fi
          # Install dependencies inside the coverage image itself (no --skip-deps),
          # so they resolve against that image's PHP. Resolving them in the separate
          # quibble image, whose PHP can differ, pulls in packages the coverage image
          # cannot run (e.g. Symfony 8 needs PHP 8.4 while quibble-coverage is 8.3).
          docker run \
            --entrypoint quibble-with-supervisord \
            -e "ZUUL_PROJECT=mediawiki/${TYPE}s/${EXTENSION_NAME}" \
            -v "$(pwd)"/cache:/cache \
            -v "$(pwd)"/src:/workspace/src \
            -v "$(pwd)"/cover:/workspace/cover \
            -v "$(pwd)"/log:/workspace/log \
            "${DOCKER_REGISTRY}/${DOCKER_ORG}/${COVERAGE_DOCKER_IMAGE}:${COVERAGE_DOCKER_LATEST_TAG}" \
            --skip-zuul \
            --packages-source composer \
            -c "${COMMAND}" \
            $DEPENDENCIES
        fi

    - if: inputs.stage != 'phan' && inputs.stage != 'coverage'
      shell: bash
      working-directory: ${{ steps.setup.outputs.dir }}
      env:
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        QUIBBLE_DOCKER_IMAGE: ${{ steps.tags.outputs.quibble_image }}
        QUIBBLE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.quibble }}
        STAGE: ${{ inputs.stage }}
        DEPENDENCIES: ${{ steps.deps.outputs.dependencies }}
      run: |
        # Quibble
        image="${DOCKER_REGISTRY}/${DOCKER_ORG}/${QUIBBLE_DOCKER_IMAGE}:${QUIBBLE_DOCKER_LATEST_TAG}"
        status=0
        docker run \
          --entrypoint quibble-with-supervisord \
          -e "ZUUL_PROJECT=mediawiki/${TYPE}s/${EXTENSION_NAME}" \
          -v "$(pwd)"/cache:/cache \
          -v "$(pwd)"/src:/workspace/src \
          -v "$(pwd)"/log:/workspace/log \
          "$image" \
          --skip-zuul \
          --packages-source composer \
          --run "${STAGE}" \
          $DEPENDENCIES || status=$?
        # composer-test: surface phpcs findings as inline annotations. phpcs has
        # no GitHub output mode, so re-run it with a checkstyle report and pipe
        # that through cs2pr. This runs in the same image (it has PHP and
        # composer) and reuses the vendor Quibble just installed in the mounted
        # src, so nothing is reinstalled. cs2pr itself is installed with composer
        # into an isolated COMPOSER_HOME.
        if [ "${STAGE}" = 'composer-test' ]; then
          docker run \
            --entrypoint bash \
            -e "PROJECT_DIR=/workspace/src/${TYPE}s/${EXTENSION_NAME}" \
            -v "$(pwd)"/src:/workspace/src \
            "$image" \
            -c 'cd "$PROJECT_DIR" && export COMPOSER_HOME=/tmp/cs2pr-home && composer global require --no-interaction --quiet staabm/annotate-pull-request-from-checkstyle:1.8.7 && vendor/bin/phpcs --report=checkstyle -q | "$(composer global config bin-dir --absolute)/cs2pr"' || true
        fi
        exit "$status"

    - name: Make Quibble logs readable
      if: always() && inputs.upload-logs == 'true'
      shell: bash
      env:
        BASE_DIR: ${{ steps.setup.outputs.dir }}
      run: |
        # Quibble runs in Docker as root, so some logs (for example
        # mysql-error.log) land root-owned and unreadable by the runner user,
        # which fails the upload step. Make the log tree readable first.
        if [ -d "$BASE_DIR/log" ]; then
          sudo chmod -R a+rX "$BASE_DIR/log"
        fi

    - name: Upload Quibble logs
      if: always() && inputs.upload-logs == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.log-artifact-name }}
        path: ${{ steps.setup.outputs.dir }}/log
        if-no-files-found: ignore

    - shell: bash
      env:
        TYPE: ${{ steps.setup.outputs.type }}
        EXTENSION_NAME: ${{ steps.setup.outputs.name }}
        DOCKER_REGISTRY: ${{ inputs.docker-registry }}
        DOCKER_ORG: ${{ inputs.docker-org }}
        QUIBBLE_DOCKER_IMAGE: ${{ steps.tags.outputs.quibble_image }}
        COVERAGE_DOCKER_IMAGE: ${{ steps.tags.outputs.coverage_image }}
        QUIBBLE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.quibble }}
        COVERAGE_DOCKER_LATEST_TAG: ${{ steps.tags.outputs.coverage }}
        BASE_DIR: ${{ steps.setup.outputs.dir }}
      run: |
        # Tear down
        cd "$BASE_DIR"
        sudo rm -rf "src/${TYPE}s/${EXTENSION_NAME}"
        # See https://doc.wikimedia.org/quibble/index.html#remove-localsettings-php-between-runs
        rm "$(pwd)"/src/LocalSettings.php || true
        mkdir -p docker-images

        rm "$(pwd)/docker-images/${QUIBBLE_DOCKER_IMAGE}" || true
        docker save -o "$(pwd)/docker-images/${QUIBBLE_DOCKER_IMAGE}" \
          "${DOCKER_REGISTRY}/${DOCKER_ORG}/${QUIBBLE_DOCKER_IMAGE}:${QUIBBLE_DOCKER_LATEST_TAG}"
        if [ -n "$COVERAGE_DOCKER_LATEST_TAG" ]; then
          rm "$(pwd)/docker-images/${COVERAGE_DOCKER_IMAGE}" || true
          docker save -o "$(pwd)/docker-images/${COVERAGE_DOCKER_IMAGE}" \
            "${DOCKER_REGISTRY}/${DOCKER_ORG}/${COVERAGE_DOCKER_IMAGE}:${COVERAGE_DOCKER_LATEST_TAG}"
        fi
