---
name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  quibble:
    name: phpunit-unit on BoilerPlate
    runs-on: ubuntu-latest
    steps:
      # Check the action out at the workspace root so it can be used as `uses: ./`,
      # and the real minimal extension under test (BoilerPlate) into a subdirectory
      # pointed at by the action's `project-path` input.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: wikimedia/mediawiki-extensions-BoilerPlate
          ref: REL1_45
          path: project
          persist-credentials: false
      - uses: ./
        with:
          stage: phpunit-unit
          mediawiki-version: REL1_45
          project-path: project
          upload-logs: true

  coverage:
    name: coverage on BoilerPlate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Coverage requires the master MediaWiki branch (that is where MediaWiki's
      # coverage tooling lives), so test BoilerPlate's master branch against it.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: wikimedia/mediawiki-extensions-BoilerPlate
          ref: master
          path: project
          persist-credentials: false
      - id: quibble
        uses: ./
        with:
          stage: coverage
          mediawiki-version: master
          project-path: project
      # Assert the coverage stage produced a report (the cover dir is non-empty).
      - name: Assert a coverage report was produced
        env:
          COVER_DIR: ${{ steps.quibble.outputs.coverage }}
        run: |
          ls -la "$COVER_DIR"
          test -n "$(ls -A "$COVER_DIR" 2>/dev/null)"
